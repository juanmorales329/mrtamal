<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>MrTamal</title>
    <link rel="manifest" href="/mrtamal/manifest.json" />
    <meta name="theme-color" content="#FF6D00" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="MrTamal" />
    <link rel="apple-touch-icon" href="/mrtamal/icon-192.png" />
    <script>
        var segmentsToKeep = 1; // mantener /mrtamal
        var l = window.location;
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + segmentsToKeep).join('/') + '/?p=/' +
            l.pathname.slice(1).split('/').slice(segmentsToKeep).join('/').replace(/&/g, '~and~') +
            (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
    </script>
</head>
<body></body>
</html>
