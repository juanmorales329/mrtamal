<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MrTamal - Sistema de Control</title>
    <base href="/mrtamal/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css?v=5" />
    <style>
        /* Layout crítico - no cacheable */
        .main-layout { min-height: 100vh; }
        @media (max-width: 768px) {
            .main-content { margin-left: 0 !important; padding-top: 56px !important; }
            .sidebar { transform: translateX(-100%); transition: transform 0.3s; }
            .sidebar-open { transform: translateX(0) !important; }
            .top-navbar { display: flex !important; }
        }
    </style>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="MrTamal.Web.styles.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script>
        // GitHub Pages SPA redirect
        (function(l) {
            if (l.search[1] === '/' ) {
                var decoded = l.search.slice(1).split('&').map(function(s) {
                    return s.replace(/~and~/g, '&')
                }).join('?');
                window.history.replaceState(null, null,
                    l.pathname.slice(0, -1) + decoded + l.hash
                );
            }
        }(window.location))
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="js/charts.js?v=5"></script>
</body>

</html>
